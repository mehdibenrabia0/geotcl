<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Détails — GeoTCL</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; flex-direction: column; }

header {
  background: #2c3e50;
  color: white;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 { font-size: 18px; font-weight: 600; }
.btn-retour {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.5);
  color: white;
  padding: 7px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
}
.btn-retour:hover { background: rgba(255,255,255,0.1); }

.container {
  max-width: 860px;
  margin: 30px auto;
  padding: 0 20px;
  width: 100%;
}

.card {
  background: white;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  margin-bottom: 20px;
  overflow: hidden;
}
.card-header {
  background: #34495e;
  color: white;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.card-body { padding: 20px; }

/* Carte Leaflet intégrée */
#mini-map {
  width: 100%;
  height: 260px;
  border-radius: 4px;
  border: 1px solid #ddd;
}

table { width: 100%; border-collapse: collapse; }
tr { border-bottom: 1px solid #f0f0f0; }
tr:last-child { border-bottom: none; }
td { padding: 10px 12px; font-size: 14px; }
td:first-child { color: #7f8c8d; width: 40%; font-weight: 500; }
td:last-child { color: #2c3e50; }

.badge {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 600;
}
.badge-paye    { background: #d4edda; color: #155724; }
.badge-nonpaye { background: #f8d7da; color: #721c24; }
.badge-cin     { background: #d0e8ff; color: #1a5276; font-family: monospace; font-size: 14px; }

.actions {
  display: flex;
  gap: 12px;
  padding: 20px;
  background: white;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.btn-modifier {
  flex: 1;
  padding: 11px;
  background: #2980b9;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 14px;
}
.btn-modifier:hover { background: #2471a3; }
.btn-supprimer {
  flex: 1;
  padding: 11px;
  background: white;
  color: #c0392b;
  border: 1px solid #c0392b;
  border-radius: 5px;
  cursor: pointer;
  font-size: 14px;
}
.btn-supprimer:hover { background: #fdf0ef; }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal {
  background: white;
  border-radius: 8px;
  width: 90%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header {
  background: #2c3e50;
  color: white;
  padding: 14px 20px;
  font-size: 15px;
  font-weight: 600;
  border-radius: 8px 8px 0 0;
}
.modal-body { padding: 20px; }
.modal-body label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; margin-top: 12px; }
.modal-body input,
.modal-body select {
  width: 100%;
  padding: 9px 11px;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 14px;
}
.modal-footer {
  padding: 14px 20px;
  display: flex;
  gap: 10px;
  border-top: 1px solid #eee;
}
.btn-annuler {
  flex: 1; padding: 9px;
  background: white; color: #555;
  border: 1px solid #ccc; border-radius: 5px; cursor: pointer;
}
.btn-sauvegarder {
  flex: 1; padding: 9px;
  background: #2980b9; color: white;
  border: none; border-radius: 5px; cursor: pointer;
}

#loading { text-align: center; padding: 60px; color: #888; font-size: 15px; }
#erreur  { text-align: center; padding: 40px; color: #c0392b; }
</style>
</head>
<body>

<header>
  <button class="btn-retour" onclick="window.location.href='map.html'">&#8592; Retour à la carte</button>
  <h1>Fiche établissement</h1>
  <span id="ref-id" style="font-size:13px; opacity:0.7;"></span>
</header>

<div class="container">
  <div id="loading">Chargement des données...</div>
  <div id="erreur"  style="display:none;"></div>
  <div id="contenu" style="display:none;">

    <!-- Carte Leaflet -->
    <div class="card">
      <div class="card-header">Localisation</div>
      <div class="card-body" style="padding:12px;">
        <div id="mini-map"></div>
      </div>
    </div>

    <!-- Informations générales -->
    <div class="card">
      <div class="card-header">Informations générales</div>
      <div class="card-body" style="padding:0;">
        <table>
          <tr><td>CIN du propriétaire</td><td id="d-cin">—</td></tr>
          <tr><td>Nom de l'établissement</td><td id="d-nom">—</td></tr>
          <tr><td>Propriétaire</td><td id="d-proprietaire">—</td></tr>
          <tr><td>Activité</td><td id="d-activite">—</td></tr>
          <tr><td>Adresse</td><td id="d-adresse">—</td></tr>
          <tr><td>Date d'ouverture</td><td id="d-date">—</td></tr>
        </table>
      </div>
    </div>

    <!-- Situation fiscale -->
    <div class="card">
      <div class="card-header">Situation fiscale</div>
      <div class="card-body" style="padding:0;">
        <table>
          <tr><td>Statut paiement TCL</td><td id="d-paye">—</td></tr>
        </table>
      </div>
    </div>

    <!-- Coordonnées GPS -->
    <div class="card">
      <div class="card-header">Coordonnées GPS</div>
      <div class="card-body" style="padding:0;">
        <table>
          <tr><td>Latitude</td><td id="d-lat">—</td></tr>
          <tr><td>Longitude</td><td id="d-lng">—</td></tr>
        </table>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-modifier"   onclick="ouvrirModal()">Modifier</button>
      <button class="btn-supprimer"  onclick="supprimer()">Supprimer</button>
    </div>

  </div><!-- fin #contenu -->
</div>

<!-- MODAL MODIFICATION -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">Modifier l'établissement</div>
    <div class="modal-body">
      <label>CIN du propriétaire</label>
      <input id="m-cin" maxlength="8" placeholder="8 chiffres">

      <label>Nom de l'établissement *</label>
      <input id="m-nom" placeholder="Nom">

      <label>Propriétaire</label>
      <input id="m-proprietaire" placeholder="Propriétaire">

      <label>Activité</label>
      <input id="m-activite" placeholder="Activité">

      <label>Adresse</label>
      <input id="m-adresse" placeholder="Adresse">

      <label>Date d'ouverture</label>
      <input type="date" id="m-date">

      <label>Statut paiement</label>
      <select id="m-paye">
        <option value="false">Non payé</option>
        <option value="true">Payé</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn-annuler"     onclick="fermerModal()">Annuler</button>
      <button class="btn-sauvegarder" onclick="sauvegarder()">Sauvegarder</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://jcfpfsmiqcdeeabwtwrw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjZnBmc21pcWNkZWVhYnd0d3J3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTQxMjksImV4cCI6MjA5MDE3MDEyOX0.QR3BQ3h7L93Kle_ziPOOHyVe2DF1nsu42xxvdf2n-tg";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var etabId   = sessionStorage.getItem("selected_id");
var etabData = null;
var miniMap  = null;

async function charger() {
  if (!etabId) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("erreur").style.display  = "block";
    document.getElementById("erreur").textContent    = "Aucun établissement sélectionné.";
    return;
  }

  const { data, error } = await db
    .from("etablissements")
    .select("*")
    .eq("id", etabId)
    .single();

  document.getElementById("loading").style.display = "none";

  if (error || !data) {
    document.getElementById("erreur").style.display  = "block";
    document.getElementById("erreur").textContent    = "Établissement introuvable.";
    return;
  }

  etabData = data;
  afficher(data);
}

function afficher(d) {
  document.getElementById("contenu").style.display = "block";
  document.getElementById("ref-id").textContent    = "Réf. #" + d.id;

  document.getElementById("d-cin").innerHTML        = d.cin ? '<span class="badge badge-cin">' + d.cin + '</span>' : '—';
  document.getElementById("d-nom").textContent        = d.nom        || "—";
  document.getElementById("d-proprietaire").textContent = d.proprietaire || "—";
  document.getElementById("d-activite").textContent   = d.activite    || "—";
  document.getElementById("d-adresse").textContent    = d.adresse     || "—";
  document.getElementById("d-date").textContent       = d.date_ouverture ? new Date(d.date_ouverture).toLocaleDateString("fr-FR") : "—";
  document.getElementById("d-lat").textContent        = d.lat;
  document.getElementById("d-lng").textContent        = d.lng;

  document.getElementById("d-paye").innerHTML = d.est_paye
    ? '<span class="badge badge-paye">Payé</span>'
    : '<span class="badge badge-nonpaye">Non payé</span>';

  // Mini carte Leaflet
  if (!miniMap) {
    miniMap = L.map("mini-map", { zoomControl: true, scrollWheelZoom: false })
               .setView([d.lat, d.lng], 16);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "© OpenStreetMap"
    }).addTo(miniMap);
  } else {
    miniMap.setView([d.lat, d.lng], 16);
    miniMap.eachLayer(function(l){ if (l instanceof L.Marker) miniMap.removeLayer(l); });
  }
  L.marker([d.lat, d.lng]).addTo(miniMap).bindPopup(d.nom).openPopup();
}

function ouvrirModal() {
  var d = etabData;
  document.getElementById("m-cin").value         = d.cin            || "";
  document.getElementById("m-nom").value         = d.nom            || "";
  document.getElementById("m-proprietaire").value = d.proprietaire  || "";
  document.getElementById("m-activite").value    = d.activite       || "";
  document.getElementById("m-adresse").value     = d.adresse        || "";
  document.getElementById("m-date").value        = d.date_ouverture || "";
  document.getElementById("m-paye").value        = d.est_paye ? "true" : "false";
  document.getElementById("modal").classList.add("active");
}
function fermerModal() {
  document.getElementById("modal").classList.remove("active");
}

async function sauvegarder() {
  var cin = document.getElementById("m-cin").value.trim();
  if (cin && (cin.length !== 8 || isNaN(cin))) {
    alert("Le CIN doit contenir exactement 8 chiffres.");
    return;
  }

  var maj = {
    cin:            cin || null,
    nom:            document.getElementById("m-nom").value.trim(),
    proprietaire:   document.getElementById("m-proprietaire").value.trim(),
    activite:       document.getElementById("m-activite").value.trim(),
    adresse:        document.getElementById("m-adresse").value.trim(),
    date_ouverture: document.getElementById("m-date").value || null,
    est_paye:       document.getElementById("m-paye").value === "true"
  };

  if (!maj.nom) { alert("Le nom est obligatoire."); return; }

  const { error } = await db.from("etablissements").update(maj).eq("id", etabId);

  if (error) { alert("Erreur lors de la modification : " + error.message); return; }

  Object.assign(etabData, maj);
  fermerModal();
  afficher(etabData);
}

async function supprimer() {
  var nom = etabData ? etabData.nom : "cet établissement";
  var ok  = confirm("Vous êtes sur le point de supprimer « " + nom + " ».\nCette action est irréversible.\n\nConfirmer la suppression ?");
  if (!ok) return;

  const { error } = await db.from("etablissements").delete().eq("id", etabId);
  if (error) { alert("Erreur lors de la suppression : " + error.message); return; }

  sessionStorage.removeItem("selected_id");
  window.location.href = "map.html";
}

charger();
</script>
</body>
</html>
